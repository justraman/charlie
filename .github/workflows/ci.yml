name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & format check
        run: bun run lint

      - name: Generate Worker types
        run: bun run --cwd apps/web cf-typegen

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun test

      - name: D1 migration check (local apply)
        run: bun run --cwd apps/web db:migrate:local

      - name: Build SPA
        run: bun run build

      - name: Wrangler deploy dry-run
        run: bun run --cwd apps/web deploy:dry
