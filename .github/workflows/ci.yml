name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    # Nx auto-disables its daemon in CI; set it explicitly for constrained runners.
    env:
      NX_DAEMON: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & format check
        run: bun run lint

      - name: Generate Worker types
        run: bun run --cwd apps/web cf-typegen

      # Nx runs typecheck/test/build across projects with caching. On a PR you
      # can scope to changed projects with `bunx nx affected -t typecheck test build`.
      - name: Typecheck
        run: bunx nx run-many -t typecheck

      - name: Unit tests
        run: bunx nx run-many -t test

      - name: D1 migration check (local apply)
        run: bun run --cwd apps/web db:migrate:local

      - name: Build SPA
        run: bunx nx run @charlie/web:build

      - name: Wrangler deploy dry-run
        run: bun run --cwd apps/web deploy:dry
