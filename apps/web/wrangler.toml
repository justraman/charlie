name = "charlie"
main = "worker/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Built Vue SPA is served as static assets; unmatched routes fall back to
# index.html (client-side routing). The Worker handles /api, /webhooks, /slack.
[assets]
binding = "ASSETS"
directory = "./dist/client"
not_found_handling = "single-page-application"
# API/webhook/Slack paths hit the Worker first; everything else is served from
# static assets (with SPA fallback to index.html for client-side routes).
run_worker_first = ["/api/*", "/webhooks/*", "/slack/*"]

# System of record. `database_id` is a placeholder for local dev; replace it
# with the real id from `wrangler d1 create charlie-db` before deploying.
[[d1_databases]]
binding = "DB"
database_name = "charlie-db"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "../../migrations"

# Short-lived state: OAuth PKCE/state, rate-limit counters, Slack nonces.
[[kv_namespaces]]
binding = "KV"
id = "charlie_kv_local_placeholder"

[observability]
enabled = true

# Non-secret vars. Secrets (GOOGLE_CLIENT_SECRET, CHARLIE_KEK, ...) come from
# .dev.vars locally and `wrangler secret put` in production.
[vars]
APP_BASE_URL = "http://localhost:8787"
COOKIE_SECURE = ""
ORG_NAME = "Charlie"
# Comma-separated Google SSO allow-list. The org row is created from this on
# first login; afterwards it is edited in the DB / admin UI.
ALLOWED_EMAIL_DOMAINS = ""
