name = "charlie"
main = "worker/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# The monorepo no longer uses Bun workspaces, so the Worker's esbuild bundle
# can't resolve @charlie/flow-core via node_modules. Alias it to source (path
# is relative to this config file). Mirrors the tsconfig `paths` entry.
[alias]
"@charlie/flow-core" = "../../packages/flow-core/src/index.ts"

# Built React SPA is served as static assets; unmatched routes fall back to
# index.html (client-side routing). The Worker handles /api, /webhooks, /slack.
[assets]
binding = "ASSETS"
directory = "./dist/client"
not_found_handling = "single-page-application"
# API/webhook/Slack paths hit the Worker first; everything else is served from
# static assets (with SPA fallback to index.html for client-side routes).
run_worker_first = ["/api/*", "/webhooks/*", "/slack/*"]

# System of record. `database_id` is a placeholder for local dev; replace it
# with the real id from `wrangler d1 create charlie-db` before deploying.
[[d1_databases]]
binding = "DB"
database_name = "charlie-db"
database_id = "bca4eabb-7756-4a27-a1ab-836eed970e3f"
migrations_dir = "../../migrations"

# Short-lived state: OAuth PKCE/state, rate-limit counters, Slack nonces.
[[kv_namespaces]]
binding = "KV"
id = "b39eba9a80104e49aa96f3f6e1ab7068"

# Large artifacts: screenshots, videos, Playwright traces, k6 summaries, HTML reports.
[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "charlie-artifacts"

# Dispatch decoupling: POST /api/runs enqueues here; the consumer dispatches to GitHub.
[[queues.producers]]
binding = "RUNS_QUEUE"
queue = "charlie-runs"

[[queues.consumers]]
queue = "charlie-runs"
max_batch_size = 5
max_retries = 3
max_batch_timeout = 5

# Per-run coordination: shard check-in, aggregation, dead-shard timeout, SSE fan-out.
[[durable_objects.bindings]]
name = "RUN_COORDINATOR"
class_name = "RunCoordinator"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RunCoordinator"]

# Cron sweep: the `scheduled` handler fires due cron schedules once a minute.
[triggers]
crons = ["* * * * *"]

[observability]
enabled = true

# Non-secret vars. Secrets (AUTH_SECRET, GOOGLE_CLIENT_SECRET, AUTH_RESEND_KEY,
# CHARLIE_KEK, SLACK_BOT_TOKEN, SLACK_SIGNING_SECRET, AI_API_KEY, GITHUB_*, ...)
# come from .dev.vars locally and `wrangler secret put` in
# production. AUTH_SECRET is REQUIRED (signs the Auth.js session JWT).
[vars]
APP_BASE_URL = "http://localhost:8787"
# Auth.js base URL. With trustHost enabled it's optional, but set it in prod to
# match your deployed origin (e.g. "https://charlie.example.com/api/auth").
AUTH_URL = "http://localhost:8787/api/auth"
COOKIE_SECURE = ""
ORG_NAME = "Charlie"
# Comma-separated SSO allow-list (applies to every provider: Google, magic-link,
# ...). The org row is created from this on first login; afterwards it is edited
# in the DB / admin UI.
ALLOWED_EMAIL_DOMAINS = ""
